    <!-- Outer arc (C shape) -->
    <path d="M 75 20 A 65 65 0 1 0 75 140 L 75 118 A 43 43 0 1 1 75 42 Z" fill="white" opacity="0.85"/>
    <!-- Inner dot -->
    <circle cx="120" cy="80" r="16" fill="white" opacity="0.85"/>
