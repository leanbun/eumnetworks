    <rect x="75" y="66" width="30" height="28" rx="4" fill="white" opacity="0.85"/>
  </g>

  <!-- "eum" text -->
  <text x="165" y="105" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="82" fill="white" letter-spacing="-1">eum</text>

  <!-- Korean subtitle -->
  <text x="168" y="152" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-weight="400" font-size="30" fill="white" opacity="0.5" letter-spacing="1">이음네트웍스글로벌</text>
</svg>
